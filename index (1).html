<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #202124;
            font-family: Arial, sans-serif;
            padding: 10px;
        }

        .calculator {
            background-color: #303134;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 360px; /* মোবাইলের জন্য পারফেক্ট সাইজ */
        }

        #display {
            width: 100%;
            height: 80px;
            background-color: #202124;
            border: none;
            outline: none;
            border-radius: 15px;
            color: #ffffff;
            font-size: 2.5rem;
            text-align: right;
            padding: 15px;
            margin-bottom: 20px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            width: 100%;
            height: 65px; /* ফিক্সড হাইট দেওয়া হয়েছে যাতে বড় না হয় */
            font-size: 1.5rem;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background-color: #3c4043;
            color: #e8eaed;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:active {
            background-color: #5f6368;
        }

        /* স্পেশাল বাটন কালার */
        button.operator {
            background-color: #fbbc04;
            color: #202124;
        }
        button.operator:active {
            background-color: #e4aa03;
        }

        button.clear {
            background-color: #da2828;
            color: white;
        }
        button.clear:active {
            background-color: #b81d1d;
        }

        button.equal {
            background-color: #1a73e8;
            color: white;
            border-radius: 20px;
        }
        button.equal:active {
            background-color: #155cb4;
        }

        .zero-btn {
            grid-column: span 2;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly placeholder="0">
    
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('/')">/</button>
        <button class="operator" onclick="appendValue('*')">*</button>
        <button class="operator" onclick="deleteLast()">⌫</button>
        
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('-')">-</button>
        
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('+')">+</button>
        
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>
        
        <button class="zero-btn" onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function appendValue(val) {
        if (display.value === '0' && val !== '.') {
            display.value = val;
        } else {
            display.value += val;
        }
    }

    function clearDisplay() {
        display.value = '';
    }

    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            if (display.value !== '') {
                display.value = eval(display.value);
            }
        } catch (error) {
            display.value = 'Error';
        }
    }
</script>

</body>
</html>
